<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Splide Reader Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="title">Splide Reader Capture</div>
      <div id="status" class="status">Press “Check Reader Status” on the reader page.</div>

      <button id="checkStatus">Check Reader Status</button>
      <button id="toggleOverlay">Toggle Overlay</button>

      <hr />

      <button id="startAuto">Start Auto ZIP</button>
      <button id="stopAuto">Stop</button>

      <hr />

      <button id="downloadSpread">Download Spread</button>

      <div class="row">
        <button id="downloadLeft">Download Left</button>
        <button id="downloadRight">Download Right</button>
      </div>

      <div class="hint">
        Targets Splide active slide, the spread root, and page1/page2 canvas wrappers.
        End detection uses last slide numbering and end-of-book or promo markers.
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
