<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manga Canvas Viewer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    
   <p>Shortcut: <span id="shortcut">Loading...</span>></span></p>
    <div class="wrap">
      <div class="title">Magcomi, viewer.heros-web, ichicomi, comic-days</div>

      <button id="startAuto">Start (Auto)</button>
      <button id="stopAuto">Stop</button>

      <hr />

      <button id="downloadSpread">Download Spread (PNG)</button>

      <div class="row">
        <button id="downloadLeft">Download Left</button>
        <button id="downloadRight">Download Right</button>
      </div>

      <div class="hint">
        Auto downloads RIGHT then LEFT, then presses Next until end is detected.
        Keep the spread fully visible on screen.
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
