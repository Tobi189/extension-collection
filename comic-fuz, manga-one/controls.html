<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Comic Fuz Controls</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body {
        width: auto;
        min-width: 340px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">Comic Fuz Controls</div>
      <div id="status" class="status">Open the reader page, then use the buttons.</div>

      <button id="checkStatus">Check Reader Status</button>
      <button id="startAuto">Start Auto ZIP</button>
      <button id="stopAuto">Stop Auto PNG</button>
      <button id="autoStatus">Check Auto Status</button>
      <button id="downloadSpread">Download Visible Spread ZIP</button>

      <div class="row">
        <button id="downloadLeft">Download Left</button>
        <button id="downloadRight">Download Right</button>
      </div>
    </div>

    <script src="controls.js"></script>
  </body>
</html>
