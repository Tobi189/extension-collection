<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Comic Fuz Downloader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="title">Comic Fuz Downloader</div>
      <div id="status" class="status">Open the reader page, then use the buttons.</div>

      <button id="checkStatus">Check Reader Status</button>
      <button id="startAuto">Start Auto ZIP</button>
      <button id="stopAuto">Stop Auto ZIP</button>
      <button id="autoStatus">Check Auto Status</button>
      <button id="downloadSpread">Download Visible Spread PNG</button>

      <div class="row">
        <button id="downloadLeft">Download Left</button>
        <button id="downloadRight">Download Right</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
